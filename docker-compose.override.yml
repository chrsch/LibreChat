services:
# USE LIBRECHAT CONFIG FILE
  api:
    depends_on:
      mongodb:
        condition: service_started
      rag_api:
        condition: service_started
    environment:
      - VIRTUAL_HOST=ai.ixc-tools.de
      - LETSENCRYPT_HOST=ai.ixc-tools.de
      - VIRTUAL_PORT=3080
      - NODE_ENV=development # development mode allows http cookies for login
      - ALLOW_DEV_COOKIES=true # Required: npm script uses cross-env NODE_ENV=production, so this enables lax sameSite cookies for network access
    volumes:
    #- /home/christoph/Repositories/Github/chrsch/plantuml-mcp-server:/app/plantuml-mcp-server
    - type: bind
      source: ./librechat.yaml
      target: /app/librechat.yaml
    - type: bind
      source: ./api/server/services/AuthService.js
      target: /app/api/server/services/AuthService.js
    # Collmex-Invoices MCP server (built dist + node_modules)
    - type: bind
      source: ./mcp-servers/collmex-invoices
      target: /app/mcp-servers/collmex-invoices
      read_only: true
    # Nextcloud-WebDAV MCP server (built dist + node_modules)
    - type: bind
      source: ./mcp-servers/nextcloud-webdav
      target: /app/mcp-servers/nextcloud-webdav
      read_only: true
    networks:
      - default
      - nginx-proxy

  rag_api:
    image: ghcr.io/danny-avila/librechat-rag-api-dev:latest

  rechnungsbucher-bot:
    container_name: rechnungsbucher-bot
    build:
      context: ./langchain/rechnungsbucher
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./langchain/rechnungsbucher/.env

networks:
  nginx-proxy:
    external: true
